<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Zombie Attack</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: red;
        }
        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
        }
        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 9px;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
            display: none;
            z-index: 200;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div>Health: <span id="health">100</span></div>
        <div>Ammo: <span id="ammo">30</span></div>
        <div>Zombies Killed: <span id="kills">0</span></div>
        <div>Wave: <span id="wave">1</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="gameOver">GAME OVER<br><span style="font-size: 24px;">Press R to Restart</span></div>
    <div id="instructions">
        WASD: Move | Mouse: Look | Click: Attack | R: Reload | 1: Rifle | 2: Axe
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script>
        // Game state
        const game = {
            health: 100,
            maxHealth: 100,
            ammo: 10,
            maxAmmo: 10,
            kills: 0,
            wave: 1,
            isGameOver: false,
            zombies: [],
            bullets: [],
            lastShot: 0,
            shootCooldown: 400, // Slower fire rate for rifle
            deathCount: 0,
            currentWeapon: 'rifle', // 'rifle' or 'axe'
            lastAxeSwing: 0,
            axeSwingCooldown: 600,
            waveInProgress: false
        };

        // Scene setup - dark night
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a15); // Very dark blue/black night sky

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        // Create rifle weapon
        const rifleGroup = new THREE.Group();

        // Rifle stock (wooden part at back)
        const stockGeometry = new THREE.BoxGeometry(0.05, 0.15, 0.25);
        const woodMaterial = new THREE.MeshStandardMaterial({
            color: 0x5a3a2a,
            roughness: 0.7
        });
        const stock = new THREE.Mesh(stockGeometry, woodMaterial);
        stock.position.set(0, -0.05, 0.2);
        rifleGroup.add(stock);

        // Rifle barrel (long metal tube)
        const barrelGeometry = new THREE.CylinderGeometry(0.015, 0.015, 0.8, 8);
        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0x333333,
            roughness: 0.4,
            metalness: 0.9
        });
        const barrel = new THREE.Mesh(barrelGeometry, metalMaterial);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0, -0.2);
        rifleGroup.add(barrel);

        // Rifle body/receiver
        const bodyGeometry = new THREE.BoxGeometry(0.06, 0.08, 0.3);
        const body = new THREE.Mesh(bodyGeometry, metalMaterial);
        body.position.set(0, 0, 0.05);
        rifleGroup.add(body);

        // Trigger guard
        const triggerGuardGeometry = new THREE.BoxGeometry(0.02, 0.06, 0.08);
        const triggerGuard = new THREE.Mesh(triggerGuardGeometry, metalMaterial);
        triggerGuard.position.set(0, -0.06, 0.05);
        rifleGroup.add(triggerGuard);

        // Magazine
        const magGeometry = new THREE.BoxGeometry(0.04, 0.15, 0.06);
        const magMaterial = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.6
        });
        const mag = new THREE.Mesh(magGeometry, magMaterial);
        mag.position.set(0, -0.12, 0);
        rifleGroup.add(mag);

        // Scope/sight
        const sightGeometry = new THREE.CylinderGeometry(0.02, 0.02, 0.15, 8);
        const sight = new THREE.Mesh(sightGeometry, metalMaterial);
        sight.rotation.z = Math.PI / 2;
        sight.position.set(0, 0.06, 0);
        rifleGroup.add(sight);

        // Position rifle in front of camera
        rifleGroup.position.set(0.25, -0.25, -0.6);
        rifleGroup.rotation.y = -0.2;
        rifleGroup.rotation.z = -0.1;
        camera.add(rifleGroup);

        // Create axe weapon
        const axeGroup = new THREE.Group();

        // Axe handle
        const handleGeometry = new THREE.CylinderGeometry(0.02, 0.025, 0.6, 8);
        const handleMaterial = new THREE.MeshStandardMaterial({
            color: 0x5a3a2a,
            roughness: 0.8
        });
        const handle = new THREE.Mesh(handleGeometry, handleMaterial);
        handle.rotation.x = Math.PI / 2;
        axeGroup.add(handle);

        // Axe blade
        const bladeGeometry = new THREE.BoxGeometry(0.15, 0.2, 0.02);
        const bladeMaterial = new THREE.MeshStandardMaterial({
            color: 0x888888,
            roughness: 0.3,
            metalness: 0.8
        });
        const blade = new THREE.Mesh(bladeGeometry, bladeMaterial);
        blade.position.set(0, 0, 0.25);
        axeGroup.add(blade);

        // Blade edge (sharper, darker)
        const edgeGeometry = new THREE.BoxGeometry(0.15, 0.02, 0.02);
        const edgeMaterial = new THREE.MeshStandardMaterial({
            color: 0xCCCCCC,
            roughness: 0.2,
            metalness: 0.9
        });
        const edge = new THREE.Mesh(edgeGeometry, edgeMaterial);
        edge.position.set(0, 0.1, 0.25);
        axeGroup.add(edge);

        // Position axe in front of camera (right side)
        axeGroup.position.set(0.3, -0.3, -0.5);
        axeGroup.rotation.y = -0.3;
        axeGroup.visible = false; // Start with rifle equipped
        camera.add(axeGroup);
        scene.add(camera);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Softer shadows
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // Post-processing setup
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);

        // Bloom effect for glowing eyes and atmosphere
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.3, // strength
            0.4, // radius
            0.85 // threshold
        );
        composer.addPass(bloomPass);

        // Vignette effect (very dark edges for night)
        const vignetteShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "offset": { value: 0.8 },
                "darkness": { value: 2.5 } // Much darker vignette
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform float offset;
                uniform float darkness;
                varying vec2 vUv;
                void main() {
                    vec4 texel = texture2D(tDiffuse, vUv);
                    vec2 uv = (vUv - vec2(0.5)) * vec2(offset);
                    gl_FragColor = vec4(mix(texel.rgb, vec3(0.0), dot(uv, uv) * darkness), texel.a);
                }
            `
        };
        const vignettePass = new THREE.ShaderPass(vignetteShader);
        vignettePass.renderToScreen = true;
        composer.addPass(vignettePass);

        // Lighting - dark night atmosphere
        const ambientLight = new THREE.AmbientLight(0x1a1a2a, 0.15); // Very dim ambient
        scene.add(ambientLight);

        // Moonlight (weak directional light)
        const moonLight = new THREE.DirectionalLight(0x6699cc, 0.3);
        moonLight.position.set(-10, 20, -5);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 2048;
        moonLight.shadow.mapSize.height = 2048;
        moonLight.shadow.camera.near = 0.5;
        moonLight.shadow.camera.far = 50;
        moonLight.shadow.camera.left = -30;
        moonLight.shadow.camera.right = 30;
        moonLight.shadow.camera.top = 30;
        moonLight.shadow.camera.bottom = -30;
        moonLight.shadow.darkness = 0.8;
        scene.add(moonLight);

        // Hemisphere light for night sky
        const hemiLight = new THREE.HemisphereLight(0x0a0a15, 0x000000, 0.2);
        scene.add(hemiLight);

        // Add thick fog for spooky atmosphere
        scene.fog = new THREE.FogExp2(0x0a0a15, 0.08); // Dense dark fog

        // Player flashlight (attached to camera)
        const flashlight = new THREE.SpotLight(0xFFFFAA, 1.5, 30, Math.PI / 6, 0.5, 2);
        flashlight.position.set(0, 0, 0);
        flashlight.target.position.set(0, 0, -1);
        flashlight.castShadow = true;
        flashlight.shadow.mapSize.width = 1024;
        flashlight.shadow.mapSize.height = 1024;
        camera.add(flashlight);
        camera.add(flashlight.target);

        // Ground with improved procedural texture
        const groundGeometry = new THREE.PlaneGeometry(100, 100, 100, 100);

        // Create higher quality procedural grass/dirt texture
        const canvas = document.createElement('canvas');
        canvas.width = 1024;
        canvas.height = 1024;
        const ctx = canvas.getContext('2d');

        // Base dirt layer
        const gradient = ctx.createRadialGradient(512, 512, 0, 512, 512, 512);
        gradient.addColorStop(0, '#3a5a3a');
        gradient.addColorStop(1, '#2a4a2a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1024, 1024);

        // Add noise/grain for texture
        for (let i = 0; i < 5000; i++) {
            const x = Math.random() * 1024;
            const y = Math.random() * 1024;
            const shade = Math.random() * 60 - 30;
            ctx.fillStyle = `rgba(${58 + shade}, ${90 + shade}, ${58 + shade}, ${Math.random() * 0.5})`;
            ctx.fillRect(x, y, Math.random() * 2 + 1, Math.random() * 2 + 1);
        }

        // Add organic dirt patches
        for (let i = 0; i < 150; i++) {
            const x = Math.random() * 1024;
            const y = Math.random() * 1024;
            const size = Math.random() * 30 + 15;
            const patchGrad = ctx.createRadialGradient(x, y, 0, x, y, size);
            patchGrad.addColorStop(0, `rgba(74, 56, 32, ${Math.random() * 0.6 + 0.3})`);
            patchGrad.addColorStop(1, 'rgba(74, 56, 32, 0)');
            ctx.fillStyle = patchGrad;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        // Add small rocks/pebbles
        for (let i = 0; i < 200; i++) {
            const x = Math.random() * 1024;
            const y = Math.random() * 1024;
            const size = Math.random() * 3 + 1;
            ctx.fillStyle = `rgba(${100 + Math.random() * 50}, ${100 + Math.random() * 50}, ${80 + Math.random() * 40}, 0.8)`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }

        const groundTexture = new THREE.CanvasTexture(canvas);
        groundTexture.wrapS = THREE.RepeatWrapping;
        groundTexture.wrapT = THREE.RepeatWrapping;
        groundTexture.repeat.set(10, 10);
        groundTexture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // Better filtering

        // Create normal map for depth
        const normalCanvas = document.createElement('canvas');
        normalCanvas.width = 1024;
        normalCanvas.height = 1024;
        const normalCtx = normalCanvas.getContext('2d');
        normalCtx.fillStyle = '#8080ff';
        normalCtx.fillRect(0, 0, 1024, 1024);

        // Add bump variations
        for (let i = 0; i < 1000; i++) {
            const x = Math.random() * 1024;
            const y = Math.random() * 1024;
            const r = Math.random() * 30 + 100;
            const g = Math.random() * 30 + 100;
            const b = Math.random() * 60 + 200;
            normalCtx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.5)`;
            normalCtx.fillRect(x, y, 3, 3);
        }

        const normalTexture = new THREE.CanvasTexture(normalCanvas);
        normalTexture.wrapS = THREE.RepeatWrapping;
        normalTexture.wrapT = THREE.RepeatWrapping;
        normalTexture.repeat.set(10, 10);

        const groundMaterial = new THREE.MeshStandardMaterial({
            map: groundTexture,
            normalMap: normalTexture,
            normalScale: new THREE.Vector2(0.3, 0.3),
            roughness: 0.95,
            metalness: 0.0,
            displacementMap: groundTexture,
            displacementScale: 0.1
        });

        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Add dirt patches on ground
        for (let i = 0; i < 20; i++) {
            const patchGeometry = new THREE.CircleGeometry(Math.random() * 2 + 1, 16);
            const patchMaterial = new THREE.MeshStandardMaterial({
                color: 0x4a3820,
                roughness: 1.0
            });
            const patch = new THREE.Mesh(patchGeometry, patchMaterial);
            patch.rotation.x = -Math.PI / 2;
            patch.position.set(
                (Math.random() - 0.5) * 80,
                0.01,
                (Math.random() - 0.5) * 80
            );
            patch.receiveShadow = true;
            scene.add(patch);
        }

        // Add barriers/sandbags in front of player (defense position)
        function createBarrier(x, z, rotation) {
            const barrierGroup = new THREE.Group();

            // Main sandbag wall
            const bagGeometry = new THREE.BoxGeometry(0.8, 0.4, 0.3);
            const bagMaterial = new THREE.MeshStandardMaterial({
                color: 0x8B7355,
                roughness: 0.95
            });

            // Bottom row
            for (let i = 0; i < 3; i++) {
                const bag = new THREE.Mesh(bagGeometry, bagMaterial);
                bag.position.set(i * 0.7 - 0.7, 0.2, 0);
                bag.castShadow = true;
                bag.receiveShadow = true;
                barrierGroup.add(bag);
            }

            // Top row (offset)
            for (let i = 0; i < 2; i++) {
                const bag = new THREE.Mesh(bagGeometry, bagMaterial);
                bag.position.set(i * 0.7 - 0.35, 0.6, 0);
                bag.castShadow = true;
                bag.receiveShadow = true;
                barrierGroup.add(bag);
            }

            barrierGroup.position.set(x, 0, z);
            barrierGroup.rotation.y = rotation;
            scene.add(barrierGroup);
        }

        // Create defensive barriers (reduced)
        createBarrier(-4, 3, 0.3);
        createBarrier(4, 3, -0.3);

        // Add abandoned crates
        function createCrate(x, z) {
            const crateGeometry = new THREE.BoxGeometry(1, 1, 1);
            const crateMaterial = new THREE.MeshStandardMaterial({
                color: 0x5a4a3a,
                roughness: 0.9
            });
            const crate = new THREE.Mesh(crateGeometry, crateMaterial);
            crate.position.set(x, 0.5, z);
            crate.castShadow = true;
            crate.receiveShadow = true;
            crate.rotation.y = Math.random() * 0.5;
            scene.add(crate);

            // Add wood plank details
            const plankGeometry = new THREE.BoxGeometry(1.05, 0.1, 0.15);
            const plankMaterial = new THREE.MeshStandardMaterial({
                color: 0x3a2a1a,
                roughness: 1.0
            });
            const plank1 = new THREE.Mesh(plankGeometry, plankMaterial);
            plank1.position.set(x, 0.5, z);
            plank1.rotation.y = crate.rotation.y;
            scene.add(plank1);

            const plank2 = new THREE.Mesh(plankGeometry, plankMaterial);
            plank2.position.set(x, 1.0, z);
            plank2.rotation.y = crate.rotation.y;
            scene.add(plank2);
        }

        createCrate(-7, -2);

        // Add simple buildings in background (ruins)
        function createRuinedBuilding(x, z) {
            const buildingGroup = new THREE.Group();

            // Main wall
            const wallGeometry = new THREE.BoxGeometry(6, 4, 0.3);
            const wallMaterial = new THREE.MeshStandardMaterial({
                color: 0x6a6a6a,
                roughness: 0.9
            });
            const wall = new THREE.Mesh(wallGeometry, wallMaterial);
            wall.position.y = 2;
            wall.castShadow = true;
            wall.receiveShadow = true;
            buildingGroup.add(wall);

            // Damaged sections (darker areas)
            const damageGeometry = new THREE.BoxGeometry(1.5, 2, 0.2);
            const damageMaterial = new THREE.MeshStandardMaterial({
                color: 0x3a3a3a
            });
            const damage1 = new THREE.Mesh(damageGeometry, damageMaterial);
            damage1.position.set(-1.5, 1.5, 0.1);
            buildingGroup.add(damage1);

            buildingGroup.position.set(x, 0, z);
            scene.add(buildingGroup);
        }

        // Add ruined buildings in far background (reduced)
        createRuinedBuilding(-15, -30);
        createRuinedBuilding(12, -28);

        // Create forest trees with textures
        function createTree(x, z, scale = 1) {
            const treeGroup = new THREE.Group();

            // Create bark texture
            const barkCanvas = document.createElement('canvas');
            barkCanvas.width = 256;
            barkCanvas.height = 256;
            const barkCtx = barkCanvas.getContext('2d');

            // Base bark color
            barkCtx.fillStyle = '#3a2a1a';
            barkCtx.fillRect(0, 0, 256, 256);

            // Vertical bark lines
            for (let i = 0; i < 256; i += 8 + Math.random() * 8) {
                barkCtx.strokeStyle = `rgba(${30 + Math.random() * 20}, ${20 + Math.random() * 15}, ${10 + Math.random() * 10}, 0.6)`;
                barkCtx.lineWidth = 2 + Math.random() * 3;
                barkCtx.beginPath();
                barkCtx.moveTo(i, 0);
                for (let y = 0; y < 256; y += 20) {
                    barkCtx.lineTo(i + (Math.random() - 0.5) * 5, y);
                }
                barkCtx.stroke();
            }

            // Knots and texture
            for (let i = 0; i < 15; i++) {
                const x = Math.random() * 256;
                const y = Math.random() * 256;
                const size = Math.random() * 8 + 4;
                barkCtx.fillStyle = `rgba(${20 + Math.random() * 20}, ${15 + Math.random() * 15}, ${10}, ${0.4 + Math.random() * 0.4})`;
                barkCtx.beginPath();
                barkCtx.arc(x, y, size, 0, Math.PI * 2);
                barkCtx.fill();
            }

            const barkTexture = new THREE.CanvasTexture(barkCanvas);
            barkTexture.wrapS = THREE.RepeatWrapping;
            barkTexture.wrapT = THREE.RepeatWrapping;

            // Tree trunk with bark texture
            const trunkGeometry = new THREE.CylinderGeometry(0.15 * scale, 0.2 * scale, 2.5 * scale, 12);
            const trunkMaterial = new THREE.MeshStandardMaterial({
                map: barkTexture,
                roughness: 0.95,
                normalScale: new THREE.Vector2(0.5, 0.5)
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.y = 1.25 * scale;
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            treeGroup.add(trunk);

            // Create foliage texture
            const foliageCanvas = document.createElement('canvas');
            foliageCanvas.width = 128;
            foliageCanvas.height = 128;
            const foliageCtx = foliageCanvas.getContext('2d');

            // Dark green base
            foliageCtx.fillStyle = '#1a3a0a';
            foliageCtx.fillRect(0, 0, 128, 128);

            // Add leaf clusters
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * 128;
                const y = Math.random() * 128;
                const green = 40 + Math.random() * 40;
                foliageCtx.fillStyle = `rgba(${Math.random() * 20}, ${green}, ${Math.random() * 10}, ${0.6 + Math.random() * 0.4})`;
                foliageCtx.fillRect(x, y, 2, 2);
            }

            const foliageTexture = new THREE.CanvasTexture(foliageCanvas);

            // Tree foliage (multiple layers for fuller look)
            const foliageGeometry = new THREE.ConeGeometry(0.8 * scale, 1.5 * scale, 8);
            const foliageMaterial = new THREE.MeshStandardMaterial({
                map: foliageTexture,
                color: 0x2d5016,
                roughness: 0.9,
                transparent: true,
                opacity: 0.95
            });

            // Bottom layer
            const foliage1 = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage1.position.y = 2.2 * scale;
            foliage1.castShadow = true;
            foliage1.receiveShadow = true;
            treeGroup.add(foliage1);

            // Middle layer
            const foliage2 = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage2.position.y = 3.0 * scale;
            foliage2.scale.set(0.8, 0.8, 0.8);
            foliage2.castShadow = true;
            treeGroup.add(foliage2);

            // Top layer
            const foliage3 = new THREE.Mesh(foliageGeometry, foliageMaterial);
            foliage3.position.y = 3.6 * scale;
            foliage3.scale.set(0.6, 0.6, 0.6);
            foliage3.castShadow = true;
            treeGroup.add(foliage3);

            treeGroup.position.set(x, 0, z);
            treeGroup.rotation.y = Math.random() * Math.PI * 2;
            scene.add(treeGroup);
        }

        // Create forest on both sides (reduced)
        // Left side forest
        for (let i = 0; i < 8; i++) {
            const x = -10 - Math.random() * 15;
            const z = -5 - Math.random() * 40;
            const scale = 0.8 + Math.random() * 0.6;
            createTree(x, z, scale);
        }

        // Right side forest
        for (let i = 0; i < 8; i++) {
            const x = 10 + Math.random() * 15;
            const z = -5 - Math.random() * 40;
            const scale = 0.8 + Math.random() * 0.6;
            createTree(x, z, scale);
        }

        // Add some dead/bare trees for variety
        function createDeadTree(x, z) {
            const trunkGeometry = new THREE.CylinderGeometry(0.1, 0.15, 3, 6);
            const trunkMaterial = new THREE.MeshStandardMaterial({
                color: 0x3a2a1a,
                roughness: 1.0
            });
            const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
            trunk.position.set(x, 1.5, z);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);

            // Add a few bare branches

            brickCtx.fillStyle = '#5a4a4a';

            const brickWidth = 40;
            const brickHeight = 20;
            for (let y = 0; y < 512; y += brickHeight) {
                for (let x = 0; x < 512; x += brickWidth) {
                    const offset = (y / brickHeight) % 2 === 0 ? 0 : brickWidth / 2;
                    const brickX = x + offset;
                    const shade = Math.random() * 30 - 15;
                    brickCtx.fillStyle = `rgb(${90 + shade}, ${74 + shade}, ${74 + shade})`;
                    brickCtx.fillRect(brickX, y, brickWidth - 2, brickHeight - 2);

        const building = createBuilding();

        // Player controls

        // Pointer lock
        document.addEventListener('click', () => {
            if (!isPointerLocked && !game.isGameOver) {
                document.body.requestPointerLock();
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPointerLocked = document.pointerLockElement === document.body;
        });

        document.addEventListener('mousemove', (e) => {
            if (isPointerLocked) {
                mouse.x -= e.movementX * 0.002;
                mouse.y -= e.movementY * 0.002;
                mouse.y = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, mouse.y));
            }
        });

            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = true;
            if (key === 'r' && game.isGameOver) restartGame();

            if (key === '1') switchWeapon('rifle');
            if (key === '2') switchWeapon('axe');

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) keys[key] = false;
        });

        // Zombie class - realistic proportions
        class Zombie {
            constructor(x, z) {
                const group = new THREE.Group();

                // Create detailed zombie skin texture (256x256)
                const skinCanvas = document.createElement('canvas');
                skinCanvas.width = 256;
                skinCanvas.height = 256;
                const skinCtx = skinCanvas.getContext('2d');

                // Base sickly green-grey skin
                const skinGradient = skinCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
                skinGradient.addColorStop(0, '#8a9a7a');
                skinGradient.addColorStop(0.5, '#7a9b76');
                skinGradient.addColorStop(1, '#6b8566');
                skinCtx.fillStyle = skinGradient;
                skinCtx.fillRect(0, 0, 256, 256);

                // Add decay spots (dark patches)
                for (let i = 0; i < 80; i++) {
                    const x = Math.random() * 256;
                    const y = Math.random() * 256;
                    const radius = 3 + Math.random() * 8;
                    const darkness = Math.random() * 60;
                    skinCtx.fillStyle = `rgba(${darkness}, ${darkness + 20}, ${darkness}, ${0.5 + Math.random() * 0.5})`;
                    skinCtx.beginPath();
                    skinCtx.arc(x, y, radius, 0, Math.PI * 2);
                    skinCtx.fill();
                }

                // Add veins (dark lines)
                for (let i = 0; i < 30; i++) {
                    skinCtx.strokeStyle = `rgba(40, 20, 20, ${0.3 + Math.random() * 0.4})`;
                    skinCtx.lineWidth = 1 + Math.random();
                    skinCtx.beginPath();
                    const startX = Math.random() * 256;
                    const startY = Math.random() * 256;
                    skinCtx.moveTo(startX, startY);
                    for (let j = 0; j < 5; j++) {
                        skinCtx.lineTo(startX + (Math.random() - 0.5) * 40, startY + j * 10);
                    }
                    skinCtx.stroke();

            update() {
                const dx = camera.position.x - this.mesh.position.x;
                const dz = camera.position.z - this.mesh.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                // Hiding behavior - crouch and stay still until player is close
                if (this.isHiding && distance > this.hidingUntilDistance) {
                    // Crouch down to hide
                    this.crouchAmount = Math.min(this.crouchAmount + 0.02, 0.5);
                    this.mesh.position.y = -this.crouchAmount;
                    this.torso.rotation.x = 0.3 + this.crouchAmount * 0.5;
                    return; // Don't move while hiding
                } else if (this.isHiding) {
                    // Spring up from hiding!
                    this.isHiding = false;
                    this.crouchAmount = 0;
                    this.mesh.position.y = 0;
                    this.torso.rotation.x = 0.1;
                }

                if (distance > 1.5) {
                    const moveX = (dx / distance) * this.speed;
                    const moveZ = (dz / distance) * this.speed;
                    this.mesh.position.x += moveX;
                    this.mesh.position.z += moveZ;

                    this.mesh.rotation.y = Math.atan2(dx, dz);

                    // Realistic zombie shambling animation
                    this.animationTime += 0.08;

                    // Limping walk - legs
                    this.leftThigh.rotation.x = Math.sin(this.animationTime) * 0.4;
                    this.rightThigh.rotation.x = Math.sin(this.animationTime + Math.PI) * 0.3;
                    this.leftShin.rotation.x = Math.max(0, Math.sin(this.animationTime) * 0.3);
                    this.rightShin.rotation.x = Math.max(0, Math.sin(this.animationTime + Math.PI) * 0.25);

                    // Arms reaching forward with uneven motion
                    this.leftUpperArm.rotation.x = -0.3 + Math.sin(this.animationTime * 0.7) * 0.2;
                    this.rightUpperArm.rotation.x = -0.4 + Math.sin(this.animationTime * 0.7 + 1) * 0.15;
                    this.leftForearm.rotation.x = 0.5 + Math.sin(this.animationTime * 0.5) * 0.1;
                    this.rightForearm.rotation.x = 0.6 + Math.sin(this.animationTime * 0.5 + 0.5) * 0.1;

                    // Head tilting and bobbing
                    this.head.rotation.z = Math.sin(this.animationTime * 0.4) * 0.15;
                    this.head.rotation.x = -0.1 + Math.sin(this.animationTime * 0.3) * 0.05;

                    // Torso lean
                    this.torso.rotation.x = 0.1 + Math.sin(this.animationTime * 0.5) * 0.05;
                } else {
                    this.attack();
                    // Attack animation - arms reaching
                    this.leftUpperArm.rotation.x = -0.8;
                    this.rightUpperArm.rotation.x = -0.8;
                }
            }

            attack() {
                const now = Date.now();
                if (now - this.lastAttack > this.attackCooldown) {
                    // Punch animation
                    const punchArm = Math.random() < 0.5 ? this.leftUpperArm : this.rightUpperArm;
                    const punchForearm = punchArm === this.leftUpperArm ? this.leftForearm : this.rightForearm;

                    // Wind up
                    punchArm.rotation.x = -1.2;
                    punchForearm.rotation.x = 0.8;

                    // Punch forward after short delay
                    setTimeout(() => {
                        punchArm.rotation.x = -0.2;
                        punchForearm.rotation.x = 0.1;

                        // Reset after punch
                        setTimeout(() => {
                            punchArm.rotation.x = -0.8;
                            punchForearm.rotation.x = 0.6;
                        }, 200);
                    }, 100);

                    game.health -= this.damage;
                    updateUI();
                    this.lastAttack = now;

                    if (game.health <= 0) {
                        gameOver();
                    }
                }
            }

            hit(damage, isHeadshot = false) {
                if (isHeadshot) {
                    // Instant kill on headshot
                    this.explodeHead();
                    return true;
                }

                this.health -= damage;
                // Flash effect on hit
                this.mesh.traverse((child) => {
                    if (child.material) {
                        child.material.emissive = new THREE.Color(0xff0000);
                        child.material.emissiveIntensity = 0.5;
                    }
                });

                setTimeout(() => {
                    this.mesh.traverse((child) => {
                        if (child.material) {
                            child.material.emissive = new THREE.Color(0x000000);
                            child.material.emissiveIntensity = 0;
                        }
                    });
                }, 100);

                return this.health <= 0;
            }

            explodeHead() {
                // Remove the head
                this.mesh.remove(this.head);

                // Create explosion particles
                const particleCount = 15;
                for (let i = 0; i < particleCount; i++) {
                    const particleGeometry = new THREE.BoxGeometry(0.05, 0.05, 0.05);
                    const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x8B0000 });
                    const particle = new THREE.Mesh(particleGeometry, particleMaterial);

                    particle.position.copy(this.head.position);
                    particle.position.x += this.mesh.position.x;
                    particle.position.y += this.mesh.position.y;
                    particle.position.z += this.mesh.position.z;

                    const velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 0.2,
                        Math.random() * 0.15,
                        (Math.random() - 0.5) * 0.2
                    );

                    scene.add(particle);

                    // Animate particle
                    const startTime = Date.now();
                    const animateParticle = () => {
                        const elapsed = Date.now() - startTime;

            update() {
                const dx = camera.position.x - this.mesh.position.x;
                const dz = camera.position.z - this.mesh.position.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                // Hiding behavior - crouch low to ground
                if (this.isHiding && distance > this.hidingUntilDistance) {
                    // Dogs hide very low
                    this.mesh.position.y = -0.3;
                    this.body.rotation.x = 0.5; // Crouch lower
                    return;
                } else if (this.isHiding) {
                    // Burst out and charge!
                    this.isHiding = false;
                    this.mesh.position.y = 0;
                    this.body.rotation.x = 0;
                }

                if (distance > 1.2) {
                    const moveX = (dx / distance) * this.speed;
                    const moveZ = (dz / distance) * this.speed;
                    this.mesh.position.x += moveX;
                    this.mesh.position.z += moveZ;

                    this.mesh.rotation.y = Math.atan2(dx, dz);

                    // Fast running animation
                    this.animationTime += 0.25;

                    // Legs running fast
                    this.frontLeftLeg.rotation.x = Math.sin(this.animationTime) * 0.8;
                    this.frontRightLeg.rotation.x = Math.sin(this.animationTime + Math.PI) * 0.8;
                    this.backLeftLeg.rotation.x = Math.sin(this.animationTime + Math.PI) * 0.8;
                    this.backRightLeg.rotation.x = Math.sin(this.animationTime) * 0.8;

                    // Body bobbing
                    this.body.position.y = 0.45 + Math.sin(this.animationTime * 2) * 0.05;
                    this.head.position.y = 0.45 + Math.sin(this.animationTime * 2) * 0.05;

                    // Jaw snapping
                    this.jaw.rotation.x = 0.3 + Math.sin(this.animationTime * 3) * 0.2;
                } else {
                    this.attack();
                    // Attack animation - lunging
                    this.head.position.x = 0.45 + Math.sin(Date.now() * 0.01) * 0.05;
                    this.jaw.rotation.x = 0.5;

                    if (game.health <= 0) {

        // Bullet class with tracer
        class Bullet {
            constructor(position, direction) {
                // Bullet projectile (smaller, faster)
                const geometry = new THREE.SphereGeometry(0.03);
                const material = new THREE.MeshBasicMaterial({
                    color: 0xFFFF00,
                    transparent: true,
                    opacity: 0.9
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.copy(position);
                scene.add(this.mesh);

                // Bullet tracer trail (visible line from rifle)
                const tracerGeometry = new THREE.BufferGeometry();
                const tracerMaterial = new THREE.LineBasicMaterial({
                    color: 0xFFAA00,
                    transparent: true,
                    opacity: 0.8,
                    linewidth: 2
                });

                this.tracerLine = new THREE.Line(tracerGeometry, tracerMaterial);
                scene.add(this.tracerLine);
                this.tracerStartPos = position.clone();

                this.velocity = direction.multiplyScalar(0.8);
                this.lifetime = 0;
                this.maxLifetime = 100;
            }

            update() {
                this.mesh.position.add(this.velocity);
                this.lifetime++;

                // Update tracer line to follow bullet
                const positions = new Float32Array([
                    this.tracerStartPos.x, this.tracerStartPos.y, this.tracerStartPos.z,
                    this.mesh.position.x, this.mesh.position.y, this.mesh.position.z
                ]);
                this.tracerLine.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                // Fade out tracer
                this.tracerLine.material.opacity = 0.8 * (1 - this.lifetime / this.maxLifetime);

                return this.lifetime >= this.maxLifetime;
            }

            checkCollision(zombie) {
                // Check headshot first (more precise)
                const headWorldPos = new THREE.Vector3();
                zombie.head.getWorldPosition(headWorldPos);
                const headDistance = this.mesh.position.distanceTo(headWorldPos);

                if (headDistance < 0.35) {
                    return { hit: true, isHeadshot: true };
                }

                // Check body hit
                const distance = this.mesh.position.distanceTo(zombie.mesh.position);
                if (distance < 0.6) {
                    return { hit: true, isHeadshot: false };
                }

                return { hit: false, isHeadshot: false };
            }

            remove() {
                scene.remove(this.mesh);
                scene.remove(this.tracerLine);
            }
        }

        // Game functions
        function switchWeapon(weapon) {
            game.currentWeapon = weapon;
            if (weapon === 'rifle') {
                rifleGroup.visible = true;
                axeGroup.visible = false;
            } else if (weapon === 'axe') {
                rifleGroup.visible = false;
                axeGroup.visible = true;
            }
        }

        function swingAxe() {
            if (game.isGameOver) return;

            const now = Date.now();
            if (now - game.lastAxeSwing < game.axeSwingCooldown) return;

            game.lastAxeSwing = now;

            // Swing animation
            const originalRotation = axeGroup.rotation.clone();
            const originalPosition = axeGroup.position.clone();

            // Swing forward
            const swingDuration = 300;
            const swingStart = Date.now();

            const animateSwing = () => {
                const elapsed = Date.now() - swingStart;
                const progress = Math.min(elapsed / swingDuration, 1);

                if (progress < 0.5) {
                    // Wind up
                    const windProgress = progress * 2;
                    axeGroup.rotation.x = -windProgress * 0.8;
                    axeGroup.position.y = originalPosition.y + windProgress * 0.1;
                } else {
                    // Swing down
                    const swingProgress = (progress - 0.5) * 2;
                    axeGroup.rotation.x = -0.8 + swingProgress * 1.2;
                    axeGroup.position.y = originalPosition.y + 0.1 - swingProgress * 0.15;
                }

                if (progress < 1) {
                    requestAnimationFrame(animateSwing);
                } else {
                    // Reset position
                    axeGroup.rotation.copy(originalRotation);
                    axeGroup.position.copy(originalPosition);
                }
            };
            animateSwing();

            // Check for hits on zombies in melee range
            for (let i = game.zombies.length - 1; i >= 0; i--) {
                const zombie = game.zombies[i];
                const distance = camera.position.distanceTo(zombie.mesh.position);

                if (distance < 2.5) { // Melee range
                    const killed = zombie.hit(50, false); // Axe does 50 damage
                    if (killed) {
                        zombie.remove();
                        game.zombies.splice(i, 1);
                        game.kills++;
                        updateUI();
                    }
                }
            }
        }

        function shoot() {
            if (game.isGameOver) return;

            const now = Date.now();
            if (now - game.lastShot < game.shootCooldown) return;
            if (game.ammo <= 0) return;

            game.lastShot = now;
            game.ammo--;
            updateUI();

            // Muzzle flash effect
            const flashGeometry = new THREE.SphereGeometry(0.1);
            const flashMaterial = new THREE.MeshBasicMaterial({
                color: 0xFFFF00,
                transparent: true,
                opacity: 1.0
            });
            const flash = new THREE.Mesh(flashGeometry, flashMaterial);
            const flashPos = camera.position.clone();
            const flashOffset = new THREE.Vector3(0.2, -0.2, -0.4);
            flashOffset.applyQuaternion(camera.quaternion);
            flashPos.add(flashOffset);
            flash.position.copy(flashPos);
            scene.add(flash);

            // Add point light for flash
            const flashLight = new THREE.PointLight(0xFFAA00, 2, 5);
            flashLight.position.copy(flashPos);
            scene.add(flashLight);

            setTimeout(() => {
                scene.remove(flash);
                scene.remove(flashLight);
            }, 50);

            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);

            // Spawn bullet from rifle barrel position
            const barrelOffset = new THREE.Vector3(0.25, -0.2, -0.8); // Right, down, forward
            barrelOffset.applyQuaternion(camera.quaternion);
            const bulletStartPos = camera.position.clone().add(barrelOffset);

            const bullet = new Bullet(bulletStartPos, direction);
            game.bullets.push(bullet);
        }

        // Blood splatter effect
        function createBloodSplatter(position) {
            const particleCount = 8;
            for (let i = 0; i < particleCount; i++) {
                const particleGeometry = new THREE.SphereGeometry(0.04);
                const particleMaterial = new THREE.MeshBasicMaterial({
                    color: 0x8B0000,
                    transparent: true,
                    opacity: 0.8
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);

                particle.position.copy(position);

                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    Math.random() * 0.08,
                    (Math.random() - 0.5) * 0.1
                );

                scene.add(particle);

                const startTime = Date.now();
                const animateParticle = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > 600) {
                        scene.remove(particle);
                        return;
                    }

                    velocity.y -= 0.004;
                    particle.position.add(velocity);
                    particle.material.opacity = 0.8 - (elapsed / 600) * 0.8;

                    requestAnimationFrame(animateParticle);
                };
                animateParticle();
            }
        }

        function reload() {
            game.ammo = game.maxAmmo;
            updateUI();
        }

        function spawnZombie() {
            // Spawn from north direction only (negative Z)
            const spawnDistance = 25 + Math.random() * 10;
            const spawnSpread = 15; // Width of spawn area
            const x = (Math.random() - 0.5) * spawnSpread;
            const z = -spawnDistance; // North direction

            // 30% chance to spawn a zombie dog instead
            if (Math.random() < 0.3) {
                const dog = new ZombieDog(x, z);
                game.zombies.push(dog);
            } else {
                const zombie = new Zombie(x, z);
                game.zombies.push(zombie);
            }
        }

        function spawnWave() {
            if (game.waveInProgress) return; // Prevent multiple waves spawning

            game.waveInProgress = true;
            const zombieCount = 2 + Math.floor(game.wave / 2); // Much fewer: wave 1-2, wave 2-2, wave 3-3, etc

            console.log(`Starting wave ${game.wave} with ${zombieCount} zombies`);

            for (let i = 0; i < zombieCount; i++) {
                setTimeout(() => spawnZombie(), i * 2000); // Spawn every 2 seconds
            }
        }

        function updateUI() {
            document.getElementById('health').textContent = Math.max(0, game.health);
            document.getElementById('ammo').textContent = game.ammo;
            document.getElementById('kills').textContent = game.kills;
            document.getElementById('wave').textContent = game.wave;
        }

        function gameOver() {
            game.isGameOver = true;
            game.deathCount++;

            if (game.deathCount >= 5) {
                document.getElementById('gameOver').innerHTML = 'GAME OVER<br><span style="font-size: 24px;">You died 5 times! Press R to Restart</span>';
            } else {
                document.getElementById('gameOver').innerHTML = `GAME OVER<br><span style="font-size: 24px;">Death ${game.deathCount}/5 - Press R to Respawn</span>`;
            }

            document.getElementById('gameOver').style.display = 'block';
            document.exitPointerLock();
        }

        function restartGame() {
            if (game.deathCount >= 5) {
                // Full restart after 5 deaths
                game.health = 100;
                game.ammo = 10;
                game.kills = 0;
                game.wave = 1;
                game.deathCount = 0;
                game.isGameOver = false;
                game.waveInProgress = false;

                game.zombies.forEach(z => z.remove());
                game.zombies = [];
                game.bullets.forEach(b => b.remove());
                game.bullets = [];

                camera.position.set(0, 1.6, 0);

                document.getElementById('gameOver').style.display = 'none';
                updateUI();
                spawnWave();
            } else {
                // Respawn after death (keep progress)
                game.health = 100;
                game.ammo = 10;
                game.isGameOver = false;
                game.waveInProgress = false;

                // Clear zombies and bullets
                game.zombies.forEach(z => z.remove());
                game.zombies = [];
                game.bullets.forEach(b => b.remove());
                game.bullets = [];

                camera.position.set(0, 1.6, 0);

                document.getElementById('gameOver').style.display = 'none';
                updateUI();
                spawnWave();
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            if (!game.isGameOver) {
                // Camera rotation
                camera.rotation.order = 'YXZ';
                camera.rotation.y = mouse.x;
                camera.rotation.x = mouse.y;

                // Player movement
                const moveVector = new THREE.Vector3();
                if (keys.w) moveVector.z -= 1;
                if (keys.s) moveVector.z += 1;
                if (keys.a) moveVector.x -= 1;
                if (keys.d) moveVector.x += 1;

                if (moveVector.length() > 0) {
                    moveVector.normalize();
                    moveVector.applyQuaternion(camera.quaternion);
                    moveVector.y = 0;
                    moveVector.normalize();
                    camera.position.add(moveVector.multiplyScalar(moveSpeed));
                }

                // Update zombies
                game.zombies.forEach((zombie, index) => {
                    zombie.update();
                });

                // Update bullets
                for (let i = game.bullets.length - 1; i >= 0; i--) {
                    const bullet = game.bullets[i];
                    const expired = bullet.update();

                    if (expired) {
                        bullet.remove();
                        game.bullets.splice(i, 1);
                        continue;
                    }

                    // Check collision with zombies
                    for (let j = game.zombies.length - 1; j >= 0; j--) {
                        const zombie = game.zombies[j];
                        const collision = bullet.checkCollision(zombie);
                        if (collision.hit) {
                            // Create blood splatter
                            createBloodSplatter(bullet.mesh.position.clone());

                            let killed;
                            if (collision.isHeadshot) {
                                // Instant kill on headshot
                                killed = zombie.hit(zombie.maxHealth, true);
                            } else {
                                // Body shot - takes 8 hits to kill (100 health / 12.5 damage)
                                killed = zombie.hit(12.5, false);
                            }

                            if (killed) {
                                zombie.remove();
                                game.zombies.splice(j, 1);
                                game.kills++;
                                updateUI();
                            }
                            bullet.remove();
                            game.bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                // Check if wave is complete
                if (game.zombies.length === 0 && !game.isGameOver && game.waveInProgress) {
                    game.waveInProgress = false;
                    game.wave++;
                    updateUI();
                    console.log(`Wave complete! Starting wave ${game.wave} in 3 seconds...`);
                    setTimeout(() => spawnWave(), 3000); // 3 second break between waves
                }
            }

            composer.render();
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start game
        updateUI();
        spawnWave();
        animate();
    </script>
</body>
</html>
